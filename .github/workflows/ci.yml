name: CI

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cirruslabs/flutter:3.41.5
    steps:
      - uses: actions/checkout@v4

      - name: Restore pub cache
        uses: actions/cache@v4
        with:
          path: /root/.pub-cache
          key: pub-cache-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: pub-cache-

      - name: Install dependencies
        run: flutter pub get

      - name: Run analyzer
        run: flutter analyze

  test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cirruslabs/flutter:3.41.5
    steps:
      - uses: actions/checkout@v4

      - name: Restore pub cache
        uses: actions/cache@v4
        with:
          path: /root/.pub-cache
          key: pub-cache-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: pub-cache-

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test
